services:

  db:
    image: postgres:17
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    container_name: fastapi_backend

    ports:
      - "8000:8000"

    depends_on:
      - db

  frontend:
    build: ./frontend

    container_name: react_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: